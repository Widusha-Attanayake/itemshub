<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - MyStore</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <div class="logo">My<span>Store</span></div>
            <button class="hamburger" onclick="toggleNav()">
                <i class="fas fa-bars"></i>
            </button>
            <nav class="nav" id="mainNav">
                <a href="index.html">Home</a>
                <a href="search.html">Search</a>
                <a href="cart.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge" id="cartBadge">0</span>
                </a>
                <a href="admin/login.html"><i class="fas fa-user-shield"></i> Admin</a>
            </nav>
        </div>
    </header>

    <main id="app" class="container">
        <h2>Search Products</h2>
        <div style="max-width: 600px; margin: 2rem auto;">
            <input type="text" id="searchInput" placeholder="Search for products..." 
                   style="width: 100%; padding: 1rem; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 1.1rem;">
        </div>
        <div id="searchResults" class="products-grid">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>
    </main>

    <footer style="background: #1a1a2e; color: white; padding: 2rem 0; margin-top: 3rem;">
        <div class="container">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem;">
                <div>
                    <h4>MyStore</h4>
                    <p style="opacity: 0.7;">Your one-stop shop for everything.</p>
                </div>
                <div>
                    <h4>Contact</h4>
                    <p style="opacity: 0.7;"><i class="fas fa-envelope"></i> support@mystore.com</p>
                    <p style="opacity: 0.7;"><i class="fas fa-phone"></i> +1 234 567 890</p>
                </div>
                <div>
                    <h4>Info</h4>
                    <p style="opacity: 0.7;">Free shipping over $50</p>
                    <p style="opacity: 0.7;">Guest checkout</p>
                </div>
            </div>
        </div>
    </footer>

    <script type="module">
        import renderSearch from './js/pages/search.js';
        renderSearch();
    </script>
    <script>
        function toggleNav() {
            document.getElementById('mainNav').classList.toggle('open');
        }
    </script>
</body>
</html>
